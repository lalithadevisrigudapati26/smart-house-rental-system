<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart House Rental System</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: #333;
}

/* Title */
.title {
    text-align: center;
    color: white;
    font-size: 32px;
    margin-top: 20px;
    font-weight: bold;
}

/* Center Box */
.container {
    width: 350px;
    margin: 40px auto;
    padding: 25px;
    background: white;
    border-radius: 12px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    text-align: center;
}

/* Inputs */
input {
    width: 80%;
    padding: 8px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    max-width: 280px;
}


button {
    width: 85%;
    padding: 8px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    background: #2a5298;
    color: white;
    font-size: 14px;
    cursor: pointer;
    max-width: 300px;
}

button:hover {
    background: #1e3c72;
}

/* Dashboard */
.dashboard {
    display: none;
    padding: 20px;
}

.dashboard-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    align-items: flex-start;
}

.big-box {
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(228, 219, 219, 0.5);
    min-height: 200px;
}

.dashboard-grid > div > .big-box {
    min-height: 220px;
}

.house-card {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.12);
    overflow: hidden;
    margin-bottom: 16px;
}

.house-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.house-card-content {
    padding: 14px;
}

.house-card-content h4 {
    margin-bottom: 8px;
}

.house-card-content p {
    margin: 4px 0;
}

.card {
    background: transparent;
    padding: 0;
    border: none;
    box-shadow: none;
    text-align: left;
}

.house {
    background: #f5f5f5;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

.house-card-content button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #2a5298;
    color: white;
    cursor: pointer;
}

.house-card-content button:hover {
    background: #1e3c72;
}

@media (max-width: 800px) {
    .dashboard-grid {
        grid-template-columns: 1fr;
    }
    .container, .card {
        width: 95%;
        margin: 10px auto;
    }
}
</style>
</head>

<body>

<div class="title">🏠 Smart House Rental System</div>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h2>Login</h2>
    <input type="email" id="loginUser" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Don't have account? <a href="#" onclick="showSignup()">Signup</a></p>
</div>

<!-- SIGNUP -->
<div class="container" id="signupBox" style="display:none;">
    <h2>Signup</h2>
    <input type="email" id="signupUser" placeholder="Email">
    <input type="password" id="signupPass" placeholder="Password">
    <button onclick="signup()">Signup</button>
    <p>Already have account? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

    <h2 style="color:white;">Welcome <span id="userName"></span></h2>
    <div id="statusMessage" style="color: #155724; background: #d4edda; border: 1px solid #c3e6cb; padding: 10px; border-radius: 8px; margin: 10px 0; display:none;"></div>

    <div class="dashboard-grid">
        <div class="big-box">
            <h3>Smart House Rental System</h3>
            <p>Use this dashboard to add and view available rental apartments.</p>

            <div class="big-box" style="padding:15px; margin-bottom:15px;">
                <h4>Search Houses</h4>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input id="topSearch" type="text" placeholder="Search houses by location" style="flex:1; padding:10px; border:2px solid #2a5298; border-radius:8px;" />
                    <button onclick="topSearchHouses()" style="padding:10px 14px;">Search</button>
                    <button onclick="resetSearch()" style="padding:10px 14px;">Show All</button>
                </div>
            </div>

            <div class="big-box" style="padding:15px;">
                <h3>Available Houses</h3>
                <div id="houseList"></div>
            </div>
        </div>
    </div>

</div>

<script>
let houses = [
    {
        name: 'Kalla Villa',
        location: 'Kalla',
        rent: '8000',
        address: '123 Kalla Road',
        description: 'Cozy 2BHK apartment close to city center with modern amenities.',
        phone: '9876543210',
        image: 'https://images.unsplash.com/photo-1560185127-6a5991fa76bb?auto=format&w=800&q=80'
    },
    {
        name: 'Sunrise Apartments',
        location: 'Central City',
        rent: '12000',
        address: '45 Central Blvd',
        description: 'Luxurious 3BHK high-rise with city view and secure parking.',
        phone: '9123456789',
        image: 'https://images.unsplash.com/photo-1560448071-1831f05b687f?auto=format&w=800&q=80'
    },
    {
        name: 'Garden Home',
        location: 'Green Park',
        rent: '9500',
        address: '88 Green Park Street',
        description: 'Spacious 2BHK near green spaces, ideal for families.',
        phone: '9012345678',
        image: 'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?auto=format&w=800&q=80'
    }
];
let users = JSON.parse(sessionStorage.getItem('users') || '[]');
let currentUser = "";

const loginUser = document.getElementById('loginUser');
const loginPass = document.getElementById('loginPass');
const signupUser = document.getElementById('signupUser');
const signupPass = document.getElementById('signupPass');
const loginBox = document.getElementById('loginBox');
const signupBox = document.getElementById('signupBox');
const dashboard = document.getElementById('dashboard');
const userName = document.getElementById('userName');
const houseName = document.getElementById('houseName');
const locationInput = document.getElementById('location');
const rentInput = document.getElementById('rent');
const addressInput = document.getElementById('address');
const descriptionInput = document.getElementById('description');
const optional1Input = document.getElementById('optional1');
const optional2Input = document.getElementById('optional2');
const imageUrlInput = document.getElementById('imageUrl');
const phoneInput = document.getElementById('phone');
const topSearch = document.getElementById('topSearch');
const statusMessage = document.getElementById('statusMessage');
const houseList = document.getElementById('houseList');

function showStatusMessage(msg) {
    statusMessage.textContent = msg;
    statusMessage.style.display = 'block';
    setTimeout(() => statusMessage.style.display = 'none', 3000);
}

function isValidEmail(email) {
    return /^[^\s@]+@gmail\.com$/.test(email);
}

/* LOGIN */
function login() {
    let u = loginUser.value.trim();
    let p = loginPass.value.trim();

    if (!u || !p) {
        alert('Please enter email and password.');
        return;
    }

    if (!isValidEmail(u)) {
        alert('Please enter a valid email address including @ and domain.');
        return;
    }

    const found = users.find(x => x.username === u && x.password === p);
    if (!found) {
        alert('Invalid credentials. Please sign up first.');
        return;
    }

    currentUser = u;
    sessionStorage.setItem('user', currentUser);
    window.location.href = 'intermediate.html';
}

/* SIGNUP */
function signup() {
    let u = signupUser.value.trim();
    let p = signupPass.value.trim();

    if (!u || !p) {
        alert('Please enter email and password to signup.');
        return;
    }

    if (!isValidEmail(u)) {
        alert('Please enter a valid email address including @ and domain.');
        return;
    }

    if (users.find(x => x.username === u)) {
        alert('Email already exists. Please login.');
        return;
    }

    users.push({username: u, password: p});
    sessionStorage.setItem('users', JSON.stringify(users));

    alert('Signup successful! Please login with your credentials.');
    loginUser.value = u;
    loginPass.value = p;
    showLogin();
}

/* SWITCH */
function toggleForms(showSignupForm){
    loginBox.style.display = showSignupForm ? 'none' : 'block';
    signupBox.style.display = showSignupForm ? 'block' : 'none';
}

function showSignup(){toggleForms(true);}
function showLogin(){toggleForms(false);}

function showSearchMode(){
    document.getElementById('searchSection').style.display = 'flex';
    document.getElementById('postSection').style.display = 'none';
}

function showPostMode(){
    document.getElementById('searchSection').style.display = 'none';
    document.getElementById('postSection').style.display = 'block';
}

/* DASHBOARD */
function parseHouseData() {
    const raw = sessionStorage.getItem('newHouse');
    if (!raw) return;
    try {
        const h = JSON.parse(raw);
        if (h.name && h.location && h.rent) {
            houses.push(h);
            showStatusMessage('House added successfully');
        }
    } catch (e) {
        console.warn('Invalid house data in sessionStorage', e);
    }
    sessionStorage.removeItem('newHouse');
}

function showDashboard() {
    loginBox.style.display = "none";
    signupBox.style.display = "none";
    currentUser = currentUser || sessionStorage.getItem('user') || 'Guest';
    parseHouseData();
    displayHouses(houses);
    dashboard.style.display = "block";
    userName.innerText = currentUser;
}

function initApp() {
    const sessionUser = sessionStorage.getItem('user');
    if (sessionUser || sessionStorage.getItem('newHouse')) {
        currentUser = sessionUser || 'Guest';
        showDashboard();
    } else showLogin();
}
window.addEventListener('DOMContentLoaded', initApp);

/* ADD HOUSE */
function addHouse() {
    let h = houseName.value.trim();
    let l = locationInput.value.trim();
    let r = rentInput.value.trim();
    let addr = addressInput.value.trim();
    let desc = descriptionInput.value.trim();
    let opt1 = optional1Input.value.trim();
    let opt2 = optional2Input.value.trim();
    let img = imageUrlInput.value.trim();
    let phone = phoneInput.value.trim();

    if (!h || !l || !r) {
        alert('Please fill in house name, location, and rent.');
        return;
    }

    if (phone && !/^[0-9]{10}$/.test(phone)) {
        alert('Phone number must be exactly 10 digits.');
        return;
    }

    houses.push({
        name: h,
        location: l,
        rent: r,
        address: addr,
        description: desc,
        optional1: opt1,
        optional2: opt2,
        phone: phone,
        image: img || 'https://via.placeholder.com/640x360?text=Apartment+Photo'
    });

    houseName.value = '';
    locationInput.value = '';
    rentInput.value = '';
    addressInput.value = '';
    descriptionInput.value = '';
    optional1Input.value = '';
    optional2Input.value = '';
    imageUrlInput.value = '';
    phoneInput.value = '';

    displayHouses(houses);
}

/* SEARCH */
function topSearchHouses() {
    let key = topSearch.value.trim();
    if (!key) {
        displayHouses(houses);
        return;
    }
    searchHouse(key);
}

function resetSearch() {
    topSearch.value = '';
    displayHouses(houses);
}

function searchHouse(keyword) {
    let key = (typeof keyword === 'string' && keyword.trim() !== '') ? keyword.trim().toLowerCase() : '';
    if (!key) {
        displayHouses(houses);
        return;
    }

    let result = houses.filter(h => h.location.toLowerCase().includes(key));

    if (result.length === 0) {
        houseList.innerHTML = `<div class="house-card"><div class="house-card-content">No houses found for "${keyword}"</div></div>`;
        return;
    }

    displayHouses(result);
}

/* DISPLAY */
function displayHouses(list) {
    houseList.innerHTML = "";

    list.forEach((h, index) => {
        houseList.innerHTML += `
        <div class="house-card">
            <div class="house-card-content">
                <h4>${h.name}</h4>
                <p><strong>Rent:</strong> ₹${h.rent}/month</p>
                <p><strong>Location:</strong> ${h.location}</p>
                ${h.phone ? `<p><strong>Phone:</strong> +91 ${h.phone}</p>` : ''}
                ${h.address ? `<p><strong>Address:</strong> ${h.address}</p>` : ''}
                ${h.description ? `<p>${h.description}</p>` : ''}
                ${h.optional1 ? `<p><strong>Optional 1:</strong> ${h.optional1}</p>` : ''}
                ${h.optional2 ? `<p><strong>Optional 2:</strong> ${h.optional2}</p>` : ''}
                <button onclick="book(${index})">Book</button>
            </div>
        </div>`;
    });
}

/* BOOK */
function book(i) {
    alert("House Booked Successfully!");
}
</script>

</body>
</html>
